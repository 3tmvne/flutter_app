name: Flutter CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.19.6'

    - name: Install dependencies
      run: cd my_app && flutter pub get

    - name: Analyze code
      run: cd my_app && flutter analyze

    - name: Run tests
      run: cd my_app && flutter test --coverage

    - name: Upload coverage to GitHub
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: coverage-report
        path: my_app/coverage/lcov.info
